services:
  frontend:
    build: ./frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  backend:
    build: ./backend
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
{% if has_plugin.get("postgres") or has_plugin.get("redis") %}
    depends_on:
{% if has_plugin.get("postgres") %}
      - postgres
{% endif %}
{% if has_plugin.get("redis") %}
      - redis
{% endif %}
{% endif %}

{% if has_plugin.get("postgres") %}
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: {{ values.get('postgres', {}).get('user', 'postgres') }}
      POSTGRES_PASSWORD: {{ values.get('postgres', {}).get('password', 'postgres') }}
      POSTGRES_DB: {{ values.get('postgres', {}).get('db', 'app_db') }}
    ports:
      - "{{ values.get('postgres', {}).get('port', 5432) }}:5432"
{% endif %}

{% if has_plugin.get("jupyter") %}
  jupyter:
    image: jupyter/base-notebook:python-3.11
    working_dir: /home/jovyan/work
    volumes:
      - ./notebooks:/home/jovyan/work
    ports:
      - "{{ values.get('jupyter', {}).get('port', 8888) }}:8888"
    command: start-notebook.py --NotebookApp.token=''
{% endif %}

{% if has_plugin.get("redis") %}
  redis:
    image: redis:7
    ports:
      - "{{ values.get('redis', {}).get('port', 6379) }}:6379"
{% endif %}

{% if has_plugin.get("celery") %}
  celery:
    build: ./backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: celery -A celery_app worker --loglevel=info
{% if has_plugin.get("redis") %}
    depends_on:
      - redis
{% endif %}
{% endif %}